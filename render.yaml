# Render Blueprint — BiyeMu (Free tier)
services:
  - type: web
    name: biyemu-shop
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 --timeout 120 -b 0.0.0.0:$PORT web.server:flask_app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.8"