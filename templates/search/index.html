{% extends "layout_app.html" %}
{% set active = 'home' %}
{% block main_extra_class %} search-main{% endblock %}
{% block title %}{{ t('search_page_title') }} — BiyeMu{% endblock %}
{% block content %}

<div class="card search-page-card">
  <form method="GET" action="{{ url_for('global_search') }}" class="search-page-form" id="searchPageForm">
    <label class="search-page-input-wrap">
      <span class="search-page-input-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="M20 20l-3.5-3.5"></path>
        </svg>
      </span>
      <input type="search" name="q" value="{{ query }}" class="search-page-input" id="searchPageInput"
             placeholder="{{ t('search_placeholder') }}" autofocus autocomplete="off"
             aria-controls="searchResults" aria-live="polite">
    </label>
    <div class="search-type-filters" role="tablist" aria-label="{{ t('search_filters_label') }}">
      <button type="button" class="search-type-chip{% if search_type == 'all' %} active{% endif %}" data-search-type="all">{{ t('search_filter_all') }}</button>
      <button type="button" class="search-type-chip{% if search_type == 'products' %} active{% endif %}" data-search-type="products">{{ t('search_filter_products') }}</button>
      <button type="button" class="search-type-chip{% if search_type == 'people' %} active{% endif %}" data-search-type="people">{{ t('search_filter_people') }}</button>
      <button type="button" class="search-type-chip{% if search_type == 'shops' %} active{% endif %}" data-search-type="shops">{{ t('search_filter_shops') }}</button>
    </div>
  </form>
</div>

<div id="searchResults" class="search-results-live{% if search_loading is defined and search_loading %} is-loading{% endif %}">
  {% include 'search/_results.html' %}
</div>

<script>
(function () {
  var form = document.getElementById('searchPageForm');
  var input = document.getElementById('searchPageInput');
  var resultsEl = document.getElementById('searchResults');
  var chips = document.querySelectorAll('[data-search-type]');
  var searchUrl = {{ url_for('global_search')|tojson }};
  var currentType = {{ search_type|tojson }};
  var debounceTimer = null;
  var activeController = null;

  function setLoading(on) {
    if (!resultsEl) return;
    resultsEl.classList.toggle('is-loading', on);
  }

  function updateUrl(q) {
    var params = new URLSearchParams();
    if (q) params.set('q', q);
    if (currentType && currentType !== 'all') params.set('type', currentType);
    var qs = params.toString();
    var next = searchUrl + (qs ? '?' + qs : '');
    if (history.replaceState) history.replaceState(null, '', next);
  }

  function runSearch() {
    if (!input || !resultsEl) return;
    var q = input.value.trim();
    updateUrl(q);

    if (activeController) activeController.abort();
    activeController = new AbortController();
    setLoading(true);

    var params = new URLSearchParams({ partial: '1', type: currentType });
    if (q) params.set('q', q);

    fetch(searchUrl + '?' + params.toString(), {
      headers: { 'X-Requested-With': 'XMLHttpRequest' },
      signal: activeController.signal
    })
      .then(function (res) { return res.text(); })
      .then(function (html) {
        resultsEl.innerHTML = html;
        setLoading(false);
      })
      .catch(function (err) {
        if (err.name !== 'AbortError') setLoading(false);
      });
  }

  function scheduleSearch() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(runSearch, 280);
  }

  if (form) {
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      clearTimeout(debounceTimer);
      runSearch();
    });
  }

  if (input) {
    input.addEventListener('input', scheduleSearch);
  }

  chips.forEach(function (chip) {
    chip.addEventListener('click', function () {
      currentType = chip.getAttribute('data-search-type') || 'all';
      chips.forEach(function (c) {
        c.classList.toggle('active', c === chip);
      });
      clearTimeout(debounceTimer);
      runSearch();
    });
  });
})();
</script>
{% endblock %}
