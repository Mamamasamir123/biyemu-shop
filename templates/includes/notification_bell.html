{% if current_user %}
<a href="{{ url_for('notifications_list') }}" class="notification-bell" title="{{ t('notifications_title') }}" aria-label="{{ t('notifications_title') }}">
  <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
  </svg>
  {% if unread_notifications %}<span class="notification-bell-badge">{{ unread_notifications }}</span>{% endif %}
</a>
{% endif %}
