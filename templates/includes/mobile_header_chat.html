{% if current_user %}
<a href="{{ url_for('staff_chat') }}" class="notification-bell mobile-header-chat" title="{{ t('chat_title') }}" aria-label="{{ t('chat_title') }}">
  <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M21 15a2 2 0 0 1-2 2H8l-5 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  {% if unread_chat_messages or pending_connections %}
  <span class="notification-bell-badge">{{ unread_chat_messages + pending_connections }}</span>
  {% endif %}
</a>
{% endif %}
